<!DOCTYPE html>
<html style="scrollbar-gutter: stable; background: #fbfbfb;">
<head>
<style>
body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
.box { width: 50vw; background: red; flex: 1; }
.animate { animation: slide 1s infinite alternate; }
@keyframes slide { from { transform: translateY(20px); } to { transform: translateY(0); } }
</style>
</head>
<body>
  <div class="box animate"></div>
</body>
</html>
